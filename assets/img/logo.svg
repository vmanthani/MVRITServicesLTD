<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MVR IT Services logo">
  <defs>
    <linearGradient id="mvrGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe29a"/>
      <stop offset="50%" stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#ff9d2e"/>
    </linearGradient>
    <linearGradient id="mvrDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101627"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="mvrGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagon shield -->
  <path d="M32 3 L57 17.5 V46.5 L32 61 L7 46.5 V17.5 Z" fill="url(#mvrDeep)" stroke="url(#mvrGold)" stroke-width="2.5"/>
  <!-- Inner hex glow line -->
  <path d="M32 9.5 L51.5 20.75 V43.25 L32 54.5 L12.5 43.25 V20.75 Z" fill="none" stroke="#f7c948" stroke-opacity="0.25" stroke-width="1"/>
  <!-- M monogram as circuit peaks -->
  <g filter="url(#mvrGlow)">
    <path d="M17 42 V24 L26 36 L32 26 L38 36 L47 24 V42"
          fill="none" stroke="url(#mvrGold)" stroke-width="3.4"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Circuit nodes -->
  <circle cx="17" cy="24" r="2.4" fill="#ffe29a"/>
  <circle cx="47" cy="24" r="2.4" fill="#ffe29a"/>
  <circle cx="32" cy="26" r="2" fill="#ff9d2e"/>
</svg>
